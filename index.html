<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Caleza - Seleccionar ubicacion</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #f3f5f7;
            --panel: rgba(255, 255, 255, 0.94);
            --panel-strong: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --line: rgba(17, 24, 39, 0.08);
            --brand: #0f172a;
            --brand-soft: #1f2937;
            --accent: #16a34a;
            --accent-soft: rgba(22, 163, 74, 0.14);
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
            --radius-lg: 22px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            position: relative;
        }

        #map {
            position: absolute;
            inset: 0;
            background: #d9e3ea;
        }

        .top-shell {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1001;
            padding: calc(8px + env(safe-area-inset-top, 0px)) 8px 0;
            pointer-events: none;
        }

        .search-panel {
            width: min(100%, 420px);
            margin: 0 auto;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 10px;
            pointer-events: auto;
        }

        .search-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .search-label {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .search-label strong {
            font-size: 13px;
        }

        .search-label span {
            color: var(--muted);
            font-size: 10px;
            line-height: 1.2;
        }

        .search-input {
            width: 100%;
            border: 1px solid rgba(17, 24, 39, 0.1);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.96);
            padding: 11px 13px;
            color: var(--text);
            font: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .search-input:focus {
            border-color: rgba(22, 163, 74, 0.45);
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
        }

        .search-hint {
            margin-top: 7px;
            color: var(--muted);
            font-size: 10px;
            line-height: 1.3;
        }

        .results {
            display: none;
            margin-top: 8px;
            max-height: min(38vh, 260px);
            overflow-y: auto;
            border-top: 1px solid rgba(17, 24, 39, 0.07);
            padding-top: 8px;
        }

        .results.show {
            display: grid;
            gap: 6px;
        }

        .result-item {
            width: 100%;
            border: 1px solid rgba(17, 24, 39, 0.08);
            border-radius: 14px;
            background: #fff;
            padding: 10px 11px;
            text-align: left;
            min-height: 0;
        }

        .result-item strong {
            display: block;
            font-size: 12px;
            margin-bottom: 3px;
            color: var(--text);
        }

        .result-item span {
            display: block;
            color: var(--muted);
            font-size: 10px;
            line-height: 1.35;
        }

        .badge {
            flex-shrink: 0;
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 999px;
            padding: 4px 7px;
            font-size: 9px;
            font-weight: 700;
            white-space: nowrap;
        }

        .bottom-sheet {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            padding: 6px 6px calc(6px + env(safe-area-inset-bottom, 0px));
            pointer-events: none;
        }

        .actions {
            width: min(100%, 350px);
            margin: 0 auto;
            background: var(--panel);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 8px;
            pointer-events: auto;
        }

        .drag-handle {
            width: 30px;
            height: 3px;
            border-radius: 999px;
            background: rgba(107, 114, 128, 0.28);
            margin: 0 auto 7px;
        }

        .status {
            margin: 0 0 7px;
            padding: 7px 9px;
            border-radius: 11px;
            background: #eef2f6;
            color: #334155;
            font-size: 11px;
            line-height: 1.3;
            font-weight: 600;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }

        .secondary-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        button {
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font: inherit;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        }

        button:active {
            transform: scale(0.985);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .btn-soft,
        .btn-danger {
            min-height: 36px;
            padding: 7px 9px;
            text-align: left;
        }

        .btn-soft {
            background: var(--panel-strong);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .btn-danger {
            background: #fff5f5;
            color: #991b1b;
            border: 1px solid rgba(220, 38, 38, 0.14);
        }

        .btn-soft strong,
        .btn-danger strong {
            display: block;
            font-size: 12px;
            margin-bottom: 1px;
        }

        .btn-soft span,
        .btn-danger span {
            display: block;
            color: var(--muted);
            font-size: 9px;
            line-height: 1.2;
        }

        .btn-primary {
            width: 100%;
            min-height: 39px;
            padding: 8px 11px;
            background: linear-gradient(180deg, var(--brand-soft), var(--brand));
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.01em;
            margin-bottom: 6px;
        }

        .leaflet-control-zoom {
            border: none !important;
            box-shadow: var(--shadow) !important;
        }

        .leaflet-control-zoom a {
            width: 32px !important;
            height: 32px !important;
            line-height: 32px !important;
            color: var(--text) !important;
        }

        @media (max-width: 480px) {
            .actions {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="top-shell">
    <section class="search-panel" aria-label="Buscar direcciones">
        <div class="search-header">
            <div class="search-label">
                <strong id="searchTitle">Buscar origen</strong>
                <span id="searchSubtitle">Escribe una direccion o un lugar y confirma el punto en el mapa.</span>
            </div>
            <div class="badge" id="searchStepBadge">Origen</div>
        </div>
        <input
            id="searchInput"
            class="search-input"
            type="search"
            inputmode="search"
            autocomplete="off"
            placeholder="Ejemplo: Parque Central, Santa Clara"
            aria-label="Buscar direccion"
        />
        <div class="search-hint" id="searchHint">Tambien puedes tocar el mapa para afinar la ubicacion.</div>
        <div id="searchResults" class="results" aria-live="polite"></div>
    </section>
</div>

<div class="bottom-sheet">
    <section class="actions" aria-label="Acciones del mapa" id="mapActions">
        <div class="drag-handle" aria-hidden="true"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;">
            <p class="status" id="status" style="margin:0;flex:1;">Toca el mapa para marcar el origen.</p>
            <div class="badge" id="stepBadge">Paso 1</div>
        </div>

        <div class="quick-actions">
            <button id="useLocation" class="btn-soft" type="button">
                <strong>Mi ubicacion</strong>
                <span>Usa GPS si esta disponible</span>
            </button>
            <button id="reset" class="btn-soft" type="button">
                <strong>Reiniciar</strong>
                <span>Borra los puntos marcados</span>
            </button>
        </div>

        <button id="send" class="btn-primary" type="button" disabled>Confirmar ruta</button>

        <div class="secondary-actions">
            <button id="cancel" class="btn-danger" type="button">
                <strong>Cancelar</strong>
                <span>Salir sin guardar este viaje</span>
            </button>
        </div>
    </section>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const DEFAULT_CENTER = [21.5218, -77.7812];
const DEFAULT_ZOOM = 7;
const CUBA_BOUNDS = L.latLngBounds([19.5, -85.3], [23.5, -73.8]);
const MAPBOX_ACCESS_TOKEN = 'pk.eyJ1IjoiYm9iYnk2IiwiYSI6ImNtbzRkM2xtZDFnaWUycHB1aHducGN1aXkifQ.zKo3Q7iSPqe4Q3-LZcjKKg';
const MAPBOX_LANGUAGE = 'es';
const MAPBOX_COUNTRY = 'cu';
const MAPBOX_API_BASE = 'https://api.mapbox.com/search/geocode/v6';
const MAPBOX_SEARCHBOX_API_BASE = 'https://api.mapbox.com/search/searchbox/v1';
const GEOCODER_PROVIDER = MAPBOX_ACCESS_TOKEN ? 'mapbox' : 'nominatim';

let map = L.map('map', { zoomControl: false }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
}).addTo(map);
map.setMaxBounds(CUBA_BOUNDS.pad(0.2));

let originMarker = null, destMarker = null;
let originCoords = null, destCoords = null;
let originAddress = '', destAddress = '';
let step = 'origin';
let searchTimer = null;
let latestSearchToken = 0;
let activeSearchSessionToken = '';

const statusDiv = document.getElementById('status');
const sendBtn = document.getElementById('send');
const locationBtn = document.getElementById('useLocation');
const resetBtn = document.getElementById('reset');
const cancelBtn = document.getElementById('cancel');
const mapActions = document.getElementById('mapActions');
const stepBadge = document.getElementById('stepBadge');
const searchTitle = document.getElementById('searchTitle');
const searchSubtitle = document.getElementById('searchSubtitle');
const searchStepBadge = document.getElementById('searchStepBadge');
const searchInput = document.getElementById('searchInput');
const searchHint = document.getElementById('searchHint');
const searchResults = document.getElementById('searchResults');
const tgUser = tg.initDataUnsafe?.user || {};
const locationManager = tg.LocationManager;
const launchQueryId = tg.initDataUnsafe?.query_id || '';
const canRelayDataToBot = !launchQueryId;

tg.ready();
tg.BackButton.show();
tg.BackButton.onClick(() => {
    if (safeSendData({ action: 'cancel_map' }, 'Vuelve al chat del bot y escribe: taxi')) {
        tg.close();
    }
});
if (typeof tg.enableClosingConfirmation === 'function') {
    tg.enableClosingConfirmation();
}

const geoCache = new Map();
const searchCache = new Map();

function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function formatFallbackLabel(lat, lng) {
    return `Ubicacion (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
}

function normalizeWhitespace(value) {
    return String(value || '').replace(/\s+/g, ' ').trim();
}

function buildAddressLabel(address) {
    if (!address) return '';
    if (typeof address === 'string') return normalizeWhitespace(address);

    const roadParts = [
        address.road,
        address.house_number,
        address.neighbourhood,
        address.suburb
    ].filter(Boolean);
    const locality = [
        address.city,
        address.town,
        address.village,
        address.municipality,
        address.county
    ].find(Boolean);
    const region = address.state || address.province || address.region;
    const pieces = [];

    if (roadParts.length) pieces.push(roadParts.join(' ').trim());
    if (locality) pieces.push(locality);
    if (region && region !== locality) pieces.push(region);

    const compact = pieces
        .map(part => normalizeWhitespace(part))
        .filter(Boolean)
        .filter((part, index, arr) => arr.indexOf(part) === index)
        .join(', ');

    return compact || normalizeWhitespace(address.display_name || '');
}

function getActiveType() {
    return step === 'destination' || step === 'done' ? 'destination' : 'origin';
}

function getActiveAddress() {
    return getActiveType() === 'origin' ? originAddress : destAddress;
}

function safeSendData(payload, fallbackMessage) {
    if (!canRelayDataToBot || typeof tg.sendData !== 'function') {
        statusDiv.textContent = fallbackMessage || 'Vuelve al chat del bot y escribe: taxi';
        return false;
    }

    tg.sendData(JSON.stringify(payload));
    return true;
}

function openMapMode() {
    updateUI();
    setTimeout(() => map.invalidateSize(), 50);
}

function getSearchBounds() {
    const bounds = map.getBounds();
    return bounds && bounds.isValid() ? bounds : CUBA_BOUNDS;
}

function createSearchSessionToken() {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return window.crypto.randomUUID();
    }

    return `session-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function ensureSearchSessionToken() {
    if (!activeSearchSessionToken) {
        activeSearchSessionToken = createSearchSessionToken();
    }

    return activeSearchSessionToken;
}

function resetSearchSessionToken() {
    activeSearchSessionToken = '';
}

function buildMapboxLabel(feature) {
    if (!feature) return '';

    const properties = feature.properties || {};
    const primary = normalizeWhitespace(
        properties.full_address ||
        properties.name_preferred ||
        properties.name ||
        feature.place_name ||
        feature.text
    );
    const secondary = normalizeWhitespace(
        properties.place_formatted ||
        feature.place_name ||
        ''
    );

    return primary || secondary || '';
}

function buildMapboxSecondary(feature, label) {
    if (!feature) return '';

    const properties = feature.properties || {};
    const secondary = normalizeWhitespace(
        properties.place_formatted ||
        feature.place_name ||
        ''
    );

    if (!secondary || secondary === label) {
        return 'Ubicacion en Cuba';
    }

    return secondary;
}

async function reverseGeocode(lat, lng) {
    const key = `${lat.toFixed(5)},${lng.toFixed(5)}`;
    if (geoCache.has(key)) return geoCache.get(key);

    try {
        let address = '';

        if (GEOCODER_PROVIDER === 'mapbox') {
            const params = new URLSearchParams({
                longitude: String(lng),
                latitude: String(lat),
                language: MAPBOX_LANGUAGE,
                country: MAPBOX_COUNTRY,
                limit: '1',
                access_token: MAPBOX_ACCESS_TOKEN
            });
            const res = await fetch(`${MAPBOX_API_BASE}/reverse?${params.toString()}`);
            const data = await res.json();
            const feature = Array.isArray(data.features) ? data.features[0] : null;
            address = buildMapboxLabel(feature);
        } else {
            const res = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=jsonv2&addressdetails=1&zoom=18`
            );
            const data = await res.json();
            address = buildAddressLabel(data.address || data) || normalizeWhitespace(data.display_name);
        }

        address = address || formatFallbackLabel(lat, lng);
        geoCache.set(key, address);
        return address;
    } catch {
        return formatFallbackLabel(lat, lng);
    }
}

async function searchPlaces(query) {
    const bounds = getSearchBounds();
    const bbox = [
        bounds.getWest().toFixed(4),
        bounds.getSouth().toFixed(4),
        bounds.getEast().toFixed(4),
        bounds.getNorth().toFixed(4)
    ].join(',');
    const cacheKey = `${query.toLowerCase()}|${bbox}`;
    if (searchCache.has(cacheKey)) {
        return searchCache.get(cacheKey);
    }

    let results = [];

    if (GEOCODER_PROVIDER === 'mapbox') {
        const center = bounds.getCenter();
        const sessionToken = ensureSearchSessionToken();
        const params = new URLSearchParams({
            q: query,
            language: MAPBOX_LANGUAGE,
            country: MAPBOX_COUNTRY,
            limit: '6',
            bbox,
            proximity: `${center.lng.toFixed(5)},${center.lat.toFixed(5)}`,
            session_token: sessionToken,
            access_token: MAPBOX_ACCESS_TOKEN
        });
        const response = await fetch(`${MAPBOX_SEARCHBOX_API_BASE}/suggest?${params.toString()}`);
        const data = await response.json();
        results = (Array.isArray(data.suggestions) ? data.suggestions : []).map(item => {
            const label = normalizeWhitespace(item.full_address || item.name_preferred || item.name || '');
            const secondary = normalizeWhitespace(
                item.place_formatted ||
                item.context?.place?.name ||
                item.context?.region?.name ||
                ''
            );

            return {
                label,
                secondary: secondary && secondary !== label ? secondary : 'Ubicacion en Cuba',
                mapboxId: item.mapbox_id || '',
                featureType: item.feature_type || ''
            };
        }).filter(item => item.label && item.mapboxId);
    } else {
        const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&countrycodes=cu&limit=6&dedupe=1&bounded=1&viewbox=${bbox}&q=${encodeURIComponent(query)}`;
        const response = await fetch(url);
        const data = await response.json();
        results = (Array.isArray(data) ? data : []).map(item => ({
            label: buildAddressLabel(item.address || item) || normalizeWhitespace(item.display_name),
            secondary: normalizeWhitespace(item.display_name || ''),
            lat: Number(item.lat),
            lng: Number(item.lon)
        })).filter(item => Number.isFinite(item.lat) && Number.isFinite(item.lng) && item.label);
    }

    searchCache.set(cacheKey, results);
    return results;
}

async function retrievePlaceDetails(selected) {
    if (GEOCODER_PROVIDER !== 'mapbox' || !selected?.mapboxId) {
        return selected;
    }

    const sessionToken = ensureSearchSessionToken();
    const params = new URLSearchParams({
        language: MAPBOX_LANGUAGE,
        session_token: sessionToken,
        access_token: MAPBOX_ACCESS_TOKEN
    });
    const response = await fetch(
        `${MAPBOX_SEARCHBOX_API_BASE}/retrieve/${encodeURIComponent(selected.mapboxId)}?${params.toString()}`
    );
    const data = await response.json();
    const feature = Array.isArray(data.features) ? data.features[0] : null;
    const coordinates = feature?.geometry?.coordinates || [];
    const label = buildMapboxLabel(feature) || selected.label;

    return {
        ...selected,
        label,
        secondary: buildMapboxSecondary(feature, label) || selected.secondary,
        lat: Number(coordinates[1]),
        lng: Number(coordinates[0])
    };
}

function clearSearchResults() {
    searchResults.innerHTML = '';
    searchResults.classList.remove('show');
}

function renderSearchResults(results) {
    if (!results.length) {
        searchResults.innerHTML = '<div class="status" style="margin:0;">No encontre resultados claros. Prueba con municipio, provincia o marca el punto en el mapa.</div>';
        searchResults.classList.add('show');
        return;
    }

    searchResults.innerHTML = results.map((result, index) => `
        <button class="result-item" type="button" data-result-index="${index}">
            <strong>${escapeHtml(result.label)}</strong>
            <span>${escapeHtml(result.secondary || 'Ubicacion en Cuba')}</span>
        </button>
    `).join('');
    searchResults.classList.add('show');
}

function focusSearchField() {
    if (typeof searchInput.focus === 'function') {
        searchInput.focus({ preventScroll: true });
    }
}

function setAddressForType(type, address) {
    if (type === 'origin') originAddress = address;
    else destAddress = address;
}

async function hydrateAddressForPoint(type, lat, lng) {
    const requestedLat = lat;
    const requestedLng = lng;
    const address = await reverseGeocode(lat, lng);

    if (type === 'origin') {
        if (!originCoords || originCoords.lat !== requestedLat || originCoords.lng !== requestedLng) return;
    } else if (!destCoords || destCoords.lat !== requestedLat || destCoords.lng !== requestedLng) {
        return;
    }

    setAddressForType(type, address);
    if (getActiveType() === type) {
        searchInput.value = address;
    }
    updateUI();
}

function applyLocation(lat, lng) {
    map.setView([lat, lng], 15);
    setMarker(step, lat, lng);
}

function getBrowserLocation() {
    return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
            reject(new Error('browser_unavailable'));
            return;
        }

        navigator.geolocation.getCurrentPosition(
            pos => {
                resolve({
                    source: 'browser',
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                });
            },
            error => {
                reject(error || new Error('browser_failed'));
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 30000
            }
        );
    });
}

function getTelegramLocation() {
    return new Promise((resolve, reject) => {
        if (!locationManager || typeof locationManager.init !== 'function') {
            reject(new Error('telegram_unavailable'));
            return;
        }

        let settled = false;
        const finishResolve = (value) => {
            if (settled) return;
            settled = true;
            resolve(value);
        };
        const finishReject = (reason) => {
            if (settled) return;
            settled = true;
            reject(reason);
        };

        const initTimer = setTimeout(() => {
            finishReject(new Error('telegram_init_timeout'));
        }, 2500);

        locationManager.init(() => {
            clearTimeout(initTimer);

            if (!locationManager.isAvailable || typeof locationManager.getLocation !== 'function') {
                finishReject(new Error('telegram_not_available'));
                return;
            }

            const readLocation = () => {
                const readTimer = setTimeout(() => {
                    finishReject(new Error('telegram_read_timeout'));
                }, 5000);

                locationManager.getLocation(location => {
                    clearTimeout(readTimer);

                    if (location && typeof location.latitude === 'number' && typeof location.longitude === 'number') {
                        finishResolve({
                            source: 'telegram',
                            lat: location.latitude,
                            lng: location.longitude
                        });
                        return;
                    }

                    finishReject(new Error('telegram_empty_location'));
                });
            };

            if (locationManager.isAccessGranted) {
                readLocation();
                return;
            }

            if (typeof locationManager.requestAccess === 'function') {
                const accessTimer = setTimeout(() => {
                    finishReject(new Error('telegram_access_timeout'));
                }, 4000);

                locationManager.requestAccess(granted => {
                    clearTimeout(accessTimer);

                    if (granted || locationManager.isAccessGranted) {
                        readLocation();
                    } else {
                        finishReject(new Error('telegram_access_denied'));
                    }
                });
                return;
            }

            finishReject(new Error('telegram_access_unsupported'));
        });
    });
}

async function requestBestLocation() {
    statusDiv.textContent = 'Buscando tu ubicacion...';

    const providers = [getBrowserLocation(), getTelegramLocation()];
    const failures = [];

    while (providers.length) {
        const wrapped = providers.map((promise, index) =>
            promise.then(
                value => ({ ok: true, index, value }),
                error => ({ ok: false, index, error })
            )
        );

        const result = await Promise.race(wrapped);
        providers.splice(result.index, 1);

        if (result.ok) {
            statusDiv.textContent = result.value.source === 'telegram'
                ? 'Ubicacion obtenida desde Telegram. Revisa el punto en el mapa.'
                : 'Ubicacion obtenida desde el GPS del dispositivo. Revisa el punto en el mapa.';
            applyLocation(result.value.lat, result.value.lng);
            return;
        }

        failures.push(result.error);
    }

    const permissionDenied = failures.some(error => error && error.code === error.PERMISSION_DENIED);
    statusDiv.textContent = permissionDenied
        ? 'Debes permitir acceso a la ubicacion en Telegram o en tu dispositivo.'
        : 'No pude leer tu ubicacion. Puedes marcar el punto manualmente.';
}

function updateUI() {
    if (originCoords && destCoords) {
        sendBtn.disabled = false;
        stepBadge.textContent = 'Listo';
        statusDiv.textContent = 'Ruta lista. Revisa los puntos y confirma.';
        searchTitle.textContent = 'Editar destino';
        searchSubtitle.textContent = 'Puedes corregir el destino desde la barra o tocando el mapa.';
        searchStepBadge.textContent = 'Destino';
        searchInput.placeholder = 'Buscar otro destino';
        searchHint.textContent = `Origen: ${originAddress || 'pendiente'} | Destino: ${destAddress || 'pendiente'}`;
        searchInput.value = destAddress || '';
    } else if (originCoords) {
        stepBadge.textContent = 'Paso 2';
        statusDiv.textContent = 'Ahora marca el destino.';
        searchTitle.textContent = 'Buscar destino';
        searchSubtitle.textContent = 'Escribe un lugar para el destino o tocalo en el mapa.';
        searchStepBadge.textContent = 'Destino';
        searchInput.placeholder = 'Ejemplo: Terminal de Omnibus, Matanzas';
        searchHint.textContent = `Origen confirmado: ${originAddress || 'ajustando ubicacion...'}`;
        searchInput.value = destAddress || '';
    } else {
        stepBadge.textContent = 'Paso 1';
        statusDiv.textContent = 'Toca el mapa para marcar el origen.';
        searchTitle.textContent = 'Buscar origen';
        searchSubtitle.textContent = 'Escribe una direccion o un lugar y confirma el punto en el mapa.';
        searchStepBadge.textContent = 'Origen';
        searchInput.placeholder = 'Ejemplo: Parque Vidal, Santa Clara';
        searchHint.textContent = 'Tambien puedes tocar el mapa para afinar la ubicacion.';
        searchInput.value = originAddress || '';
    }
}

function setMarker(type, lat, lng, options = {}) {
    const normalizedAddress = normalizeWhitespace(options.addressLabel || '');
    const markerColor = type === 'origin' ? '#16a34a' : '#111827';
    const marker = L.circleMarker([lat, lng], {
        radius: 9,
        weight: 3,
        color: '#ffffff',
        fillColor: markerColor,
        fillOpacity: 1
    }).addTo(map);

    if (type === 'origin') {
        if (originMarker) map.removeLayer(originMarker);
        originMarker = marker;
        originCoords = { lat, lng };
        originAddress = normalizedAddress;
        step = 'destination';
        destCoords = null;
        destAddress = '';
        if (destMarker) {
            map.removeLayer(destMarker);
            destMarker = null;
        }
    } else {
        if (destMarker) map.removeLayer(destMarker);
        destMarker = marker;
        destCoords = { lat, lng };
        destAddress = normalizedAddress;
        step = 'done';
        const bounds = L.latLngBounds([originCoords, destCoords]);
        setTimeout(() => map.fitBounds(bounds, { padding: [50, 90] }), 100);
    }

    updateUI();
    clearSearchResults();

    // Keep the label chosen from search results; only reverse geocode manual pin drops.
    if (!normalizedAddress) {
        hydrateAddressForPoint(type, lat, lng);
    }
}

function cancelMapFlow() {
    statusDiv.textContent = 'Cancelando...';
    if (safeSendData({ action: 'cancel_map' }, 'Vuelve al chat del bot y escribe: taxi')) {
        tg.close();
    }
}

resetBtn.onclick = () => {
    if (originMarker) map.removeLayer(originMarker);
    if (destMarker) map.removeLayer(destMarker);
    originMarker = destMarker = null;
    originCoords = destCoords = null;
    originAddress = destAddress = '';
    step = 'origin';
    resetSearchSessionToken();
    clearSearchResults();
    updateUI();
    map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
};

cancelBtn.onclick = cancelMapFlow;
openMapMode();

map.on('click', e => {
    if (step === 'origin') setMarker('origin', e.latlng.lat, e.latlng.lng);
    else if (step === 'destination') setMarker('destination', e.latlng.lat, e.latlng.lng);
});

locationBtn.onclick = () => {
    statusDiv.textContent = step === 'origin'
        ? 'Buscando tu ubicacion para el origen...'
        : 'Buscando tu ubicacion para el destino...';

    requestBestLocation();
};

searchInput.addEventListener('input', () => {
    const query = normalizeWhitespace(searchInput.value);

    if (searchTimer) clearTimeout(searchTimer);
    if (query.length < 3) {
        resetSearchSessionToken();
        clearSearchResults();
        return;
    }

    const searchToken = ++latestSearchToken;
    searchTimer = setTimeout(async () => {
        searchResults.innerHTML = '<div class="status" style="margin:0;">Buscando direcciones...</div>';
        searchResults.classList.add('show');

        try {
            const results = await searchPlaces(query);
            if (searchToken !== latestSearchToken) return;
            renderSearchResults(results);
        } catch {
            if (searchToken !== latestSearchToken) return;
            searchResults.innerHTML = '<div class="status" style="margin:0;">No pude buscar ahora mismo. Puedes marcar el punto manualmente.</div>';
            searchResults.classList.add('show');
        }
    }, 320);
});

searchResults.addEventListener('click', event => {
    const button = event.target.closest('[data-result-index]');
    if (!button) return;

    const index = Number(button.getAttribute('data-result-index'));
    const query = normalizeWhitespace(searchInput.value);
    const bounds = getSearchBounds();
    const bbox = [
        bounds.getWest().toFixed(4),
        bounds.getSouth().toFixed(4),
        bounds.getEast().toFixed(4),
        bounds.getNorth().toFixed(4)
    ].join(',');
    const cacheKey = `${query.toLowerCase()}|${bbox}`;
    const results = searchCache.get(cacheKey) || [];
    const selected = results[index];
    if (!selected) return;

    const activeType = getActiveType();

    (async () => {
        try {
            statusDiv.textContent = 'Confirmando direccion seleccionada...';
            const resolved = await retrievePlaceDetails(selected);
            if (!Number.isFinite(resolved.lat) || !Number.isFinite(resolved.lng)) {
                throw new Error('missing_coordinates');
            }

            map.flyTo([resolved.lat, resolved.lng], 16, { duration: 0.6 });
            setMarker(activeType, resolved.lat, resolved.lng, { addressLabel: resolved.label });
            searchInput.value = resolved.label;
            clearSearchResults();
            resetSearchSessionToken();
        } catch {
            statusDiv.textContent = 'No pude confirmar esa direccion. Prueba otra opcion o marca el punto en el mapa.';
        }
    })();
});

searchInput.addEventListener('search', () => {
    if (!searchInput.value) {
        resetSearchSessionToken();
        clearSearchResults();
    }
});

searchInput.addEventListener('focus', () => {
    if (searchInput.value.trim().length >= 3 && searchResults.innerHTML.trim()) {
        searchResults.classList.add('show');
    }
});

sendBtn.onclick = async () => {
    if (!originCoords || !destCoords) return;

    statusDiv.textContent = 'Obteniendo direcciones...';
    sendBtn.disabled = true;

    try {
        const [finalOriginAddress, finalDestAddress] = await Promise.all([
            originAddress || reverseGeocode(originCoords.lat, originCoords.lng),
            destAddress || reverseGeocode(destCoords.lat, destCoords.lng)
        ]);

        const data = {
            action: 'submit_trip',
            origin_address: finalOriginAddress,
            destination_address: finalDestAddress,
            origin: originCoords,
            destination: destCoords,
            client_name: `${tgUser.first_name || ''} ${tgUser.last_name || ''}`.trim(),
            client_username: tgUser.username || '',
            details: '',
            vehicle_type: null,
            vehicle_category: null,
            manual_text_only: false
        };

        statusDiv.textContent = 'Enviando ruta al bot...';
        if (safeSendData(data, 'Este modo no puede completar el viaje aqui. Vuelve al chat del bot y escribe: taxi')) {
            tg.close();
        } else {
            sendBtn.disabled = false;
        }

    } catch (e) {
        statusDiv.textContent = 'No pude obtener las direcciones. Intenta de nuevo.';
        sendBtn.disabled = false;
    }
};

focusSearchField();
updateUI();
</script>
