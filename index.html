<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Caleza - Seleccionar ubicacion</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #f3f5f7;
            --panel: rgba(255, 255, 255, 0.94);
            --panel-strong: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --line: rgba(17, 24, 39, 0.08);
            --brand: #0f172a;
            --brand-soft: #1f2937;
            --accent: #16a34a;
            --accent-soft: rgba(22, 163, 74, 0.14);
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
            --radius-lg: 22px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            position: relative;
        }

        #map {
            position: absolute;
            inset: 0;
            background: #d9e3ea;
        }

        .launcher {
            position: fixed;
            inset: 0;
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.18), rgba(15, 23, 42, 0.28)),
                linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04));
            backdrop-filter: blur(10px);
        }

        .launcher[hidden] {
            display: none;
        }

        .launcher-card {
            width: min(100%, 320px);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.2);
            padding: 16px;
        }

        .launcher-title {
            margin: 0 0 4px;
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
        }

        .launcher-subtitle {
            margin: 0 0 14px;
            font-size: 12px;
            line-height: 1.35;
            color: var(--muted);
        }

        .launcher-actions {
            display: grid;
            gap: 8px;
        }

        .badge {
            flex-shrink: 0;
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 999px;
            padding: 4px 7px;
            font-size: 9px;
            font-weight: 700;
            white-space: nowrap;
        }

        .bottom-sheet {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            padding: 6px 6px calc(6px + env(safe-area-inset-bottom, 0px));
            pointer-events: none;
        }

        .actions {
            width: min(100%, 350px);
            margin: 0 auto;
            background: var(--panel);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 8px;
            pointer-events: auto;
        }

        .drag-handle {
            width: 30px;
            height: 3px;
            border-radius: 999px;
            background: rgba(107, 114, 128, 0.28);
            margin: 0 auto 7px;
        }

        .status {
            margin: 0 0 7px;
            padding: 7px 9px;
            border-radius: 11px;
            background: #eef2f6;
            color: #334155;
            font-size: 11px;
            line-height: 1.3;
            font-weight: 600;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }

        .secondary-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        button {
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font: inherit;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        }

        button:active {
            transform: scale(0.985);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .btn-soft,
        .btn-danger {
            min-height: 36px;
            padding: 7px 9px;
            text-align: left;
        }

        .btn-soft {
            background: var(--panel-strong);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .btn-danger {
            background: #fff5f5;
            color: #991b1b;
            border: 1px solid rgba(220, 38, 38, 0.14);
        }

        .btn-soft strong,
        .btn-danger strong {
            display: block;
            font-size: 12px;
            margin-bottom: 1px;
        }

        .btn-soft span,
        .btn-danger span {
            display: block;
            color: var(--muted);
            font-size: 9px;
            line-height: 1.2;
        }

        .btn-primary {
            width: 100%;
            min-height: 39px;
            padding: 8px 11px;
            background: linear-gradient(180deg, var(--brand-soft), var(--brand));
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.01em;
            margin-bottom: 6px;
        }

        .btn-launch {
            min-height: 42px;
            padding: 10px 12px;
            text-align: left;
        }

        .btn-launch strong {
            display: block;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .btn-launch span {
            display: block;
            color: var(--muted);
            font-size: 10px;
            line-height: 1.25;
        }

        .leaflet-control-zoom {
            border: none !important;
            box-shadow: var(--shadow) !important;
        }

        .leaflet-control-zoom a {
            width: 32px !important;
            height: 32px !important;
            line-height: 32px !important;
            color: var(--text) !important;
        }

        @media (max-width: 480px) {
            .actions {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="map"></div>

<section class="launcher" id="launcher">
    <div class="launcher-card">
        <h1 class="launcher-title">Pide tu viaje</h1>
        <p class="launcher-subtitle">Elige como quieres indicar origen y destino.</p>

        <div class="launcher-actions">
            <button id="launchMap" class="btn-soft btn-launch" type="button">
                <strong>Usar mapa</strong>
                <span>Marca origen y destino sobre el mapa</span>
            </button>
            <button id="launchManual" class="btn-soft btn-launch" type="button">
                <strong>Escribir manualmente</strong>
                <span>Continua en el chat con direccion por texto</span>
            </button>
            <button id="launchCancel" class="btn-danger btn-launch" type="button">
                <strong>Cancelar</strong>
                <span>Salir sin iniciar este viaje</span>
            </button>
        </div>
    </div>
</section>

<div class="bottom-sheet">
    <section class="actions" aria-label="Acciones del mapa" id="mapActions" hidden>
        <div class="drag-handle" aria-hidden="true"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;">
            <p class="status" id="status" style="margin:0;flex:1;">Toca el mapa para marcar el origen.</p>
            <div class="badge" id="stepBadge">Paso 1</div>
        </div>

        <div class="quick-actions">
            <button id="useLocation" class="btn-soft" type="button">
                <strong>Mi ubicacion</strong>
                <span>Usa GPS si esta disponible</span>
            </button>
            <button id="reset" class="btn-soft" type="button">
                <strong>Reiniciar</strong>
                <span>Borra los puntos marcados</span>
            </button>
        </div>

        <button id="send" class="btn-primary" type="button" disabled>Confirmar ruta</button>

        <div class="secondary-actions">
            <button id="cancel" class="btn-danger" type="button">
                <strong>Cancelar</strong>
                <span>Salir sin guardar este viaje</span>
            </button>
        </div>
    </section>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let map = L.map('map', { zoomControl: false }).setView([23.1136, -82.3666], 13);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
}).addTo(map);

let originMarker = null, destMarker = null;
let originCoords = null, destCoords = null;
let step = 'origin';

const statusDiv = document.getElementById('status');
const sendBtn = document.getElementById('send');
const locationBtn = document.getElementById('useLocation');
const resetBtn = document.getElementById('reset');
const cancelBtn = document.getElementById('cancel');
const launchMapBtn = document.getElementById('launchMap');
const launchManualBtn = document.getElementById('launchManual');
const launchCancelBtn = document.getElementById('launchCancel');
const launcher = document.getElementById('launcher');
const mapActions = document.getElementById('mapActions');
const stepBadge = document.getElementById('stepBadge');
const tgUser = tg.initDataUnsafe?.user || {};
const locationManager = tg.LocationManager;

tg.ready();
tg.BackButton.show();
tg.BackButton.onClick(() => {
    tg.sendData(JSON.stringify({ action: 'cancel_map' }));
    tg.close();
});
if (typeof tg.enableClosingConfirmation === 'function') {
    tg.enableClosingConfirmation();
}

const geoCache = new Map();

function openMapMode() {
    launcher.hidden = true;
    mapActions.hidden = false;
    updateUI();
    setTimeout(() => map.invalidateSize(), 50);
}

async function reverseGeocode(lat, lng) {
    const key = `${lat.toFixed(5)},${lng.toFixed(5)}`;
    if (geoCache.has(key)) return geoCache.get(key);

    try {
        const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
        );
        const data = await res.json();
        const address = data.display_name || `Lat: ${lat}, Lng: ${lng}`;
        geoCache.set(key, address);
        return address;
    } catch {
        return `Lat: ${lat}, Lng: ${lng}`;
    }
}

function applyLocation(lat, lng) {
    map.setView([lat, lng], 15);
    setMarker(step, lat, lng);
}

function fallbackToBrowserGeolocation() {
    if (!navigator.geolocation) {
        statusDiv.textContent = 'Tu dispositivo no permite usar GPS aqui.';
        return;
    }

    navigator.geolocation.getCurrentPosition(
        pos => {
            const { latitude, longitude } = pos.coords;
            applyLocation(latitude, longitude);
        },
        () => {
            statusDiv.textContent = 'No pude leer tu ubicacion. Puedes marcar el punto manualmente.';
        },
        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 30000
        }
    );
}

function requestTelegramLocation() {
    if (!locationManager || typeof locationManager.init !== 'function') {
        fallbackToBrowserGeolocation();
        return;
    }

    locationManager.init(() => {
        if (!locationManager.isAvailable || typeof locationManager.getLocation !== 'function') {
            fallbackToBrowserGeolocation();
            return;
        }

        const readLocation = () => {
            locationManager.getLocation(location => {
                if (location && typeof location.latitude === 'number' && typeof location.longitude === 'number') {
                    applyLocation(location.latitude, location.longitude);
                    return;
                }

                fallbackToBrowserGeolocation();
            });
        };

        if (locationManager.isAccessGranted) {
            readLocation();
            return;
        }

        if (typeof locationManager.requestAccess === 'function') {
            locationManager.requestAccess(granted => {
                if (granted || locationManager.isAccessGranted) {
                    readLocation();
                } else {
                    fallbackToBrowserGeolocation();
                }
            });
            return;
        }

        fallbackToBrowserGeolocation();
    });
}

function updateUI() {
    if (originCoords && destCoords) {
        sendBtn.disabled = false;
        stepBadge.textContent = 'Listo';
        statusDiv.textContent = 'Ruta lista. Revisa los puntos y confirma.';
    } else if (originCoords) {
        stepBadge.textContent = 'Paso 2';
        statusDiv.textContent = 'Ahora marca el destino.';
    } else {
        stepBadge.textContent = 'Paso 1';
        statusDiv.textContent = 'Toca el mapa para marcar el origen.';
    }
}

function setMarker(type, lat, lng) {
    const markerColor = type === 'origin' ? '#16a34a' : '#111827';
    const marker = L.circleMarker([lat, lng], {
        radius: 9,
        weight: 3,
        color: '#ffffff',
        fillColor: markerColor,
        fillOpacity: 1
    }).addTo(map);

    if (type === 'origin') {
        if (originMarker) map.removeLayer(originMarker);
        originMarker = marker;
        originCoords = { lat, lng };
        step = 'destination';
    } else {
        if (destMarker) map.removeLayer(destMarker);
        destMarker = marker;
        destCoords = { lat, lng };
        step = 'done';
        const bounds = L.latLngBounds([originCoords, destCoords]);
        setTimeout(() => map.fitBounds(bounds, { padding: [50, 90] }), 100);
    }

    updateUI();
}

function cancelMapFlow() {
    statusDiv.textContent = 'Cancelando...';
    tg.sendData(JSON.stringify({ action: 'cancel_map' }));
    tg.close();
}

function openManualFlow() {
    tg.sendData(JSON.stringify({ action: 'open_manual_flow' }));
    tg.close();
}

resetBtn.onclick = () => {
    if (originMarker) map.removeLayer(originMarker);
    if (destMarker) map.removeLayer(destMarker);
    originMarker = destMarker = null;
    originCoords = destCoords = null;
    step = 'origin';
    updateUI();
};

cancelBtn.onclick = cancelMapFlow;
launchMapBtn.onclick = openMapMode;
launchManualBtn.onclick = openManualFlow;
launchCancelBtn.onclick = cancelMapFlow;

map.on('click', e => {
    if (!launcher.hidden) return;
    if (step === 'origin') setMarker('origin', e.latlng.lat, e.latlng.lng);
    else if (step === 'destination') setMarker('destination', e.latlng.lat, e.latlng.lng);
});

locationBtn.onclick = () => {
    statusDiv.textContent = step === 'origin'
        ? 'Buscando tu ubicacion para el origen...'
        : 'Buscando tu ubicacion para el destino...';

    requestTelegramLocation();
};

sendBtn.onclick = async () => {
    if (!originCoords || !destCoords) return;

    statusDiv.textContent = 'Obteniendo direcciones...';
    sendBtn.disabled = true;

    try {
        const [originAddress, destAddress] = await Promise.all([
            reverseGeocode(originCoords.lat, originCoords.lng),
            reverseGeocode(destCoords.lat, destCoords.lng)
        ]);

        const data = {
            action: 'submit_trip',
            origin_address: originAddress,
            destination_address: destAddress,
            origin: originCoords,
            destination: destCoords,
            client_name: `${tgUser.first_name || ''} ${tgUser.last_name || ''}`.trim(),
            client_username: tgUser.username || '',
            details: '',
            vehicle_type: null,
            vehicle_category: null,
            manual_text_only: false
        };

        statusDiv.textContent = 'Enviando ruta al bot...';
        tg.sendData(JSON.stringify(data));
        tg.close();

    } catch (e) {
        statusDiv.textContent = 'No pude obtener las direcciones. Intenta de nuevo.';
        sendBtn.disabled = false;
    }
};

updateUI();
</script>

</body>
</html>
